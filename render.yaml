# Render Blueprint - Infraestructura como código
# https://render.com/docs/blueprint-spec
#
# Para usar: Dashboard -> Blueprints -> New Blueprint Instance -> Seleccionar repo

databases:
  - name: subscriptify-db
    databaseName: subscriptify_production
    user: subscriptify
    region: oregon
    plan: free
    postgresMajorVersion: 16
    ipAllowList: []

services:
  # ===================
  # Web Service (Rails)
  # ===================
  - type: web
    name: subscriptify-web
    runtime: ruby
    region: oregon
    plan: free
    buildCommand: ./bin/render-build.sh
    startCommand: bundle exec puma -C config/puma.rb
    healthCheckPath: /health
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_LEVEL
        value: info
      - key: RAILS_LOG_TO_STDOUT
        value: enabled
      - key: RAILS_SERVE_STATIC_FILES
        value: enabled
      - key: RUBYOPT
        value: --yjit
      - key: WEB_CONCURRENCY
        value: "1"
      - key: RAILS_MAX_THREADS
        value: "2"
      - key: DOMAIN
        value: www.subscriptify.me
      - key: RAILS_MASTER_KEY
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: RESENDER_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: subscriptify-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: subscriptify-redis
          type: redis
          property: connectionString

  # ============================
  # Background Worker (Sidekiq)
  # ============================
  - type: worker
    name: subscriptify-worker
    runtime: ruby
    region: oregon
    plan: free
    buildCommand: bundle install
    startCommand: bundle exec sidekiq -C config/sidekiq.yml
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_LEVEL
        value: info
      - key: RAILS_MASTER_KEY
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: RESENDER_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: subscriptify-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: subscriptify-redis
          type: redis
          property: connectionString

  # =====
  # Redis
  # =====
  - type: redis
    name: subscriptify-redis
    region: oregon
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []
