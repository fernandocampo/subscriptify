# Configuración optimizada para Render free tier (512 MB RAM, Redis 25 MB)
:concurrency: 2
:timeout: 60
:verbose: false

:queues:
  # Queue priority (mayor número = mayor prioridad):
  # https://github.com/mperham/sidekiq/wiki/Advanced-Options
  - [default, 3]
  - [mailers, 2]
  - [notification_helper, 2]
  - [active_storage_analysis, 1]
  - [active_storage_purge, 1]
