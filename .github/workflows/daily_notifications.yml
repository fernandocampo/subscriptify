name: Daily Notifications

on:
  schedule:
    - cron: "40 1 * * *"  # 22:40 America/Argentina/Buenos_Aires (UTC-3)
  workflow_dispatch:  # permite ejecutarlo manualmente desde GitHub

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily notifications
        run: |
          curl --fail -X POST https://www.subscriptify.me/webhooks/daily_notifications \
            -H "X-Webhook-Token: ${{ secrets.WEBHOOK_SECRET }}"
